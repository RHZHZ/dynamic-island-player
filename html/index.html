<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵动岛播放器 - 完整示例</title>
  <link rel="stylesheet" href="../vanilla/dynamic-island-player.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #f5f5f7 0%, #e5e5e7 100%);
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 60px;
    }

    .header h1 {
      font-size: 3em;
      color: #1d1d1f;
      margin-bottom: 16px;
      font-weight: 700;
    }

    .header p {
      font-size: 1.2em;
      color: #6b7280;
      max-width: 600px;
      margin: 0 auto;
    }

    .demo-section {
      background: white;
      border-radius: 24px;
      padding: 40px;
      margin-bottom: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    }

    .demo-title {
      font-size: 1.8em;
      color: #1d1d1f;
      margin-bottom: 24px;
      font-weight: 600;
    }

    .demo-description {
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .audio-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .audio-item {
      padding: 20px;
      background: #f5f5f7;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .audio-item:hover {
      background: #e5e5e7;
      transform: translateY(-2px);
    }

    .audio-item h3 {
      margin: 0 0 8px 0;
      color: #1d1d1f;
    }

    .audio-item p {
      margin: 0;
      color: #6b7280;
      font-size: 0.9em;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      background: #0071e3;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #0051a8;
    }

    .btn-secondary {
      background: #f5f5f7;
      color: #1d1d1f;
    }

    .btn-secondary:hover {
      background: #e5e5e7;
    }

    .btn-danger {
      background: #ff3b30;
    }

    .btn-danger:hover {
      background: #d70015;
    }

    .status {
      margin-top: 20px;
      padding: 16px;
      background: #f5f5f7;
      border-radius: 12px;
      font-family: monospace;
      font-size: 0.9em;
      color: #1d1d1f;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #1d1d1f 0%, #000000 100%);
      }

      .demo-section {
        background: #2d2d2f;
      }

      .header h1 {
        color: white;
      }

      .demo-title {
        color: white;
      }

      .audio-item {
        background: #3d3d3f;
      }

      .audio-item:hover {
        background: #4d4d4f;
      }

      .audio-item h3 {
        color: white;
      }

      .status {
        background: #3d3d3f;
        color: white;
      }

      .btn-secondary {
        background: #3d3d3f;
        color: white;
      }

      .btn-secondary:hover {
        background: #4d4d4f;
      }
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 2em;
      }

      .demo-section {
        padding: 24px;
      }

      .audio-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎵 灵动岛播放器</h1>
      <p>一套跨平台的macOS风格灵动岛音乐播放器，支持原生JavaScript、React、Vue等多种使用方式</p>
    </div>

    <div class="demo-section">
      <h2 class="demo-title">🎮 播放器控制</h2>
      <p class="demo-description">这是一个完整的灵动岛播放器示例，支持多首歌曲切换、歌词显示、音量控制等功能。</p>

      <div class="controls">
        <button class="btn" onclick="player.togglePlay()">播放/暂停</button>
        <button class="btn" onclick="player.next()">下一首</button>
        <button class="btn" onclick="player.prev()">上一首</button>
        <button class="btn" onclick="player.toggleLrc()">显示/隐藏歌词</button>
        <button class="btn btn-secondary" onclick="player.expand()">展开</button>
        <button class="btn btn-secondary" onclick="player.collapse()">收起</button>
        <button class="btn btn-danger" onclick="addRandomTrack()">添加随机歌曲</button>
      </div>

      <div class="status" id="status">
        状态：等待播放器初始化...
      </div>
    </div>

    <div class="demo-section">
      <h2 class="demo-title">📋 播放列表</h2>
      <p class="demo-description">点击歌曲可以在播放器中播放</p>

      <div class="audio-list" id="audioList"></div>
    </div>

    <div class="demo-section">
      <h2 class="demo-title">📱 移动端适配</h2>
      <p class="demo-description">灵动岛播放器完美适配各种屏幕尺寸</p>

      <div class="controls">
        <button class="btn btn-secondary" onclick="toggleMobileMode()">切换移动端模式</button>
        <button class="btn btn-secondary" onclick="toggleDarkMode()">切换暗色模式</button>
      </div>
    </div>

    <div class="demo-section">
      <h2 class="demo-title">🔧 API 演示</h2>
      <p class="demo-description">展示播放器的各种API方法</p>

      <div class="controls">
        <button class="btn btn-secondary" onclick="getPlayerInfo()">获取播放器信息</button>
        <button class="btn btn-secondary" onclick="getCurrentTime()">获取当前时间</button>
        <button class="btn btn-secondary" onclick="setVolume()">设置音量 (50%)</button>
      </div>
    </div>
  </div>

  <script src="../vanilla/dynamic-island-player.js"></script>
  <script>
    // 示例音频数据
    const audioList = [
      {
        name: '夜曲',
        artist: '周杰伦',
        url: 'https://music.163.com/song/media/outer/url?id=1867217766.mp3',
        cover: 'https://p2.music.126.net/34YW1QtKxJ_3YnX9ZzKhzw==/109951163480593680.jpg',
        lrc: `[00:00.00] 为你弹奏萧邦的夜曲
[00:02.50] 纪念我逝去的爱情
[00:05.00] 而我为你隐姓埋名
[00:07.50] 在月光下等你`
      },
      {
        name: '晴天',
        artist: '周杰伦',
        url: 'https://music.163.com/song/media/outer/url?id=1867217765.mp3',
        cover: 'https://p2.music.126.net/34YW1QtKxJ_3YnX9ZzKhzw==/109951163480593680.jpg'
      },
      {
        name: '稻香',
        artist: '周杰伦',
        url: 'https://music.163.com/song/media/outer/url?id=1867217764.mp3',
        cover: 'https://p2.music.126.net/34YW1QtKxJ_3YnX9ZzKhzw==/109951163480593680.jpg'
      }
    ];

    let player = null;
    let isMobileMode = false;
    let isDarkMode = false;

    // 初始化播放器
    function initPlayer() {
      player = new DynamicIslandPlayer({
        audio: audioList,
        autoPlay: false,
        showLrc: true,
        position: 'bottom-left'
      });

      // 监听事件
      player.on('ready', () => {
        updateStatus('播放器准备就绪');
        console.log('🎵 灵动岛播放器已加载完成');
      });

      player.on('play', () => {
        updateStatus('正在播放: ' + player.getCurrentTrack().name);
      });

      player.on('pause', () => {
        updateStatus('播放暂停');
      });

      player.on('trackchange', (track) => {
        updateStatus('切换到: ' + track.name);
      });

      player.on('error', (error) => {
        updateStatus('播放错误: ' + error.message);
        console.error('播放错误:', error);
      });

      // 渲染播放列表
      renderAudioList();
    }

    // 更新状态显示
    function updateStatus(status) {
      document.getElementById('status').textContent = '状态：' + status;
    }

    // 渲染音频列表
    function renderAudioList() {
      const audioListEl = document.getElementById('audioList');
      audioListEl.innerHTML = audioList.map((audio, index) => `
        <div class="audio-item" onclick="playTrack(${index})">
          <h3>${audio.name}</h3>
          <p>${audio.artist}</p>
        </div>
      `).join('');
    }

    // 播放指定歌曲
    function playTrack(index) {
      if (player) {
        player.switchTrack(index);
        player.play();
      }
    }

    // 添加随机歌曲
    function addRandomTrack() {
      const randomAudio = {
        name: '随机歌曲 ' + Math.floor(Math.random() * 100),
        artist: '随机歌手',
        url: 'https://music.163.com/song/media/outer/url?id=' + Math.floor(Math.random() * 1000000) + '.mp3',
        cover: 'https://p2.music.126.net/34YW1QtKxJ_3YnX9ZzKhzw==/109951163480593680.jpg'
      };

      player.addTrack(randomAudio);
      audioList.push(randomAudio);
      renderAudioList();
      updateStatus('已添加: ' + randomAudio.name);
    }

    // 切换移动端模式
    function toggleMobileMode() {
      isMobileMode = !isMobileMode;
      if (player) {
        player.setMobileMode(isMobileMode);
        updateStatus('移动端模式: ' + (isMobileMode ? '开启' : '关闭'));
      }
    }

    // 切换暗色模式
    function toggleDarkMode() {
      isDarkMode = !isDarkMode;
      document.documentElement.style.setProperty('color-scheme', isDarkMode ? 'dark' : 'light');
      updateStatus('暗色模式: ' + (isDarkMode ? '开启' : '关闭'));
    }

    // 获取播放器信息
    function getPlayerInfo() {
      if (player) {
        const info = player.getPlayerInfo();
        console.log('播放器信息:', info);
        alert('播放器信息已打印到控制台');
      }
    }

    // 获取当前时间
    function getCurrentTime() {
      if (player) {
        const time = player.getCurrentTime();
        const duration = player.getDuration();
        updateStatus(`当前时间: ${player.formatTime(time)} / ${player.formatTime(duration)}`);
      }
    }

    // 设置音量
    function setVolume() {
      if (player) {
        player.setVolume(0.5);
        updateStatus('音量已设置为 50%');
      }
    }

    // 页面加载完成后初始化播放器
    document.addEventListener('DOMContentLoaded', function() {
      initPlayer();
    });

    // 页面卸载时销毁播放器
    window.addEventListener('beforeunload', function() {
      if (player) {
        player.destroy();
      }
    });
  </script>
</body>
</html>
